<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D AI 測驗系統</title>

<style>
body{
font-family:sans-serif;
background:#f5f5f5;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
font-size:18px;
}

.correct{
background:#28a745;
color:white;
}

.wrong{
background:#dc3545;
color:white;
}

.normal{
background:#eee;
}

#result{
font-size:22px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h2>3D AI 模擬測驗</h2>

<div class="card">
<div id="question"></div>
</div>

<div id="choices"></div>

<div id="result"></div>

<script>

const questions = [

{
q:"261. 關於AI，下列何者正確？",
a:["AI僅能處理結構化資料","AI涵蓋多種學科領域與技術","AI未被應用於醫療","AI無法應用於金融"],
answer:1
},

{
q:"262. 下列何者非大數據特徵？",
a:["資料量大","資料變動速度快","資料多樣性","資料存儲位置固定"],
answer:3
},

{
q:"263. 銀行客服聊天機器人主要使用哪種技術？",
a:["資料庫管理","機器學習與自然語言處理","網路安全","網頁開發"],
answer:1
},

{
q:"264. 生成式AI最可能使用於？",
a:["產品檢測","醫學影像分析","監控系統","虛擬現實圖像"],
answer:3
},

{
q:"265. 在AI治理中，下列何者重要？",
a:["統一AI發展標準","避免AI技術濫用","促進AI技術轉移","以上皆是"],
answer:3
}

];

let current=0;

function loadQuestion(){

document.getElementById("result").innerHTML="";

let q=questions[current];

document.getElementById("question").innerHTML=q.q;

let html="";

q.a.forEach((choice,index)=>{

html+=`
<button class="normal"
onclick="checkAnswer(${index})">
${String.fromCharCode(65+index)}. ${choice}
</button>
`;

});

document.getElementById("choices").innerHTML=html;
}

function checkAnswer(i){

let q=questions[current];

if(i===q.answer){

document.getElementById("result").innerHTML="✅ 答對";

}else{

document.getElementById("result").innerHTML=
"❌ 答錯 正確答案："+String.fromCharCode(65+q.answer);
}

setTimeout(()=>{

current++;

if(current>=questions.length){

document.body.innerHTML=
"<h1>測驗完成</h1>";

return;
}

loadQuestion();

},1000);
}

loadQuestion();

</script>

</body>
</html>
